# These 4 tests (tc3 / tc5 / tc14 / tc22) were previously marked @pytest.mark.xfail
# to absorb demo-site flakiness. Their page-object helpers have been refactored
# to (a) accept multiple wording variants of the demo site's copy, (b) poll up
# to TIMEOUT for success signals on network-flake flows like payment AJAX, and
# (c) tolerate ad-overlay / hover / modal drift, so the xfail markers are no
# longer needed and the assertions are now real.
#
# If any of these tests starts failing again on the public demo site, the
# most likely cause is wording / markup drift on automationexercise.com. Update
# the selector ladder and assertion keywords in:
#   pages/signup_login_page.py    (tc3 login error, tc5 'already exists')
#   pages/checkout_page.py        (tc14 pay-and-confirm success signal)
#   pages/products_page.py        (tc22 recommended-items Add-to-Cart)
[pytest]
addopts = --browser=chromium --html=report.html --self-contained-html -v --tb=short --reruns 2 --reruns-delay 1
testpaths = tests
python_files = test_*.py
